        <td><hr>
          <span class="content">製酒DIY的部份，有提供製作紅麴、甜酒釀、黑豆酒、大蒜酒等這些釀酒的體驗。這部份採預約制，老闆會事先將相關的材料道具準備好，讓遊客可以輕易的享受釀酒的樂趣。<br>
整個過程老闆一邊解說一邊示範，把米、酵母菌等原料混合，用厭氧醱酵法來處理，並說明市面上釀造酒與蒸餾酒的差別，以及酒精濃度和稅率的關係，有了這些知識，能讓大家喝到更純淨健康的酒。 <br>
          </span>
          <table width="100%"  border="0" cellspacing="0" cellpadding="10">
